<!DOCTYPE html>
<html lang="id">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Undangan Pernikahan Alya & Wahyu</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

body{
background:#000;
font-family:Arial,sans-serif;
overflow-x:hidden;
}

/* COVER */

#cover{
position:fixed;
top:0;
left:0;
width:100%;
height:100vh;
background:#5a1a1a;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
color:white;
z-index:9999;
padding:20px;
}

#cover h1{
font-size:30px;
margin-bottom:25px;
line-height:1.4;
}

.cover-btn{
padding:14px 24px;
border:none;
border-radius:30px;
margin:8px;
font-size:16px;
cursor:pointer;
font-weight:bold;
}

/* GAMBAR UNDANGAN */

#content img{
display:block;
width:100%;
height:auto;
}

/* TOMBOL HOME */

#homeBtn{
position:fixed;
bottom:20px;
right:20px;

width:60px;
height:60px;

border:none;
border-radius:50%;

background:white;
font-size:24px;
cursor:pointer;

box-shadow:0 4px 10px rgba(0,0,0,.3);

display:none;

z-index:10000;
}

</style>
</head>

<body onclick="startMusic()">

<!-- MUSIK -->

<audio id="music" loop>
<source src="musik.mp3" type="audio/mpeg">
</audio>

<!-- COVER -->

<div id="cover">

<h1>
Undangan Pernikahan<br>
Alya & Wahyu
</h1>

<button class="cover-btn" onclick="openInvitation()">
💌 Buka Undangan
</button>

<button class="cover-btn" onclick="openMap()">
📍 Peta Lokasi Resepsi
</button>

</div>

<!-- ISI UNDANGAN -->

<div id="content">

<img src="halaman1.jpg" alt="">
<img src="halaman2.jpg" alt="">
<img src="halaman3.jpg" alt="">
<img src="halaman4.jpg" alt="">
<img src="halaman5.jpg" alt="">
<img src="halaman6.jpg" alt="">

</div>

<!-- TOMBOL BERANDA -->

<button id="homeBtn" onclick="showCover()">
🏠
</button>

<script>

const music = document.getElementById("music");
let started = false;

function startMusic(){

if(!started){

music.play().catch(() => {});

started = true;

}

}

function openInvitation(){

document.getElementById("cover").style.display = "none";

document.getElementById("homeBtn").style.display = "block";

window.scrollTo({
top:0,
behavior:"smooth"
});

startMusic();

}

function showCover(){

document.getElementById("cover").style.display = "flex";

document.getElementById("homeBtn").style.display = "none";

window.scrollTo({
top:0,
behavior:"smooth"
});

}

function openMap(){

window.open(
"https://www.google.com/maps?q=Royal+Ambarrukmo+Yogyakarta",
"_blank"
);

}

</script>

</body>
</html>
