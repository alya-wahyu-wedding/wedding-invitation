<!DOCTYPE html>
<html lang="id">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Undangan Pernikahan Alya & Wahyu</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

body{
font-family:Arial,sans-serif;
background:#000;
overflow-x:hidden;
}

/* COVER */

#cover{
width:100%;
height:100vh;
background:#5a1a1a;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
color:white;
padding:20px;
}

#cover h1{
font-size:30px;
margin-bottom:25px;
}

button{
padding:14px 22px;
border:none;
border-radius:30px;
margin:8px;
font-size:16px;
cursor:pointer;
font-weight:bold;
}

/* FOTO */

#content img{
width:100%;
height:100vh;
object-fit:cover;
display:block;
}

/* TOMBOL BERANDA */

.float{
position:fixed;
bottom:20px;
right:20px;
z-index:9999;

background:white;
color:black;

padding:12px 18px;
border:none;
border-radius:50px;

font-size:14px;
font-weight:bold;

box-shadow:0 4px 10px rgba(0,0,0,.3);
cursor:pointer;
}

</style>
</head>

<body onclick="startMusic()">

<!-- MUSIK -->

<audio id="music" loop>
<source src="musik.mp3" type="audio/mpeg">
</audio>

<!-- COVER -->

<div id="cover">

<h1>
Undangan Pernikahan<br>
Alya & Wahyu
</h1>

<button onclick="openInvitation()">
💌 Buka Undangan
</button>

<button onclick="openMap()">
📍 Peta Lokasi Resepsi
</button>

</div>

<!-- ISI UNDANGAN -->

<div id="content">

<img src="halaman1.jpg">
<img src="halaman2.jpg">
<img src="halaman3.jpg">
<img src="halaman4.jpg">
<img src="halaman5.jpg">
<img src="halaman6.jpg">

</div>

<!-- TOMBOL BERANDA -->

<button
id="backBtn"
class="float"
onclick="backHome()"
style="display:none;">
🏠 Beranda
</button>

<script>

const music = document.getElementById("music");
let started = false;

function startMusic(){
if(!started){
music.play();
started = true;
}
}

function openInvitation(){

document.getElementById("cover").style.display="none";

document.getElementById("backBtn").style.display="block";

window.scrollTo({
top:0,
behavior:"smooth"
});

startMusic();
}

function backHome(){

document.getElementById("cover").style.display="flex";

document.getElementById("backBtn").style.display="none";

window.scrollTo({
top:0,
behavior:"smooth"
});
}

function openMap(){

window.open(
"https://www.google.com/maps?q=Royal+Ambarrukmo+Yogyakarta",
"_blank"
);

}

</script>

</body>
</html>
