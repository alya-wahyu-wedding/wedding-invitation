<!DOCTYPE html>
<html lang="id">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Undangan Pernikahan</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{
    background:#000;
    overflow-x:hidden;
    font-family:Arial, sans-serif;
}

/* COVER */

#cover{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100vh;
    background:#5a1a1a;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    color:white;
    z-index:9999;
    padding:20px;
}

#cover h1{
    font-size:32px;
    margin-bottom:15px;
}

#cover p{
    margin-bottom:30px;
    font-size:16px;
}

.btn{
    padding:14px 28px;
    border:none;
    border-radius:30px;
    cursor:pointer;
    margin:8px;
    font-size:16px;
}

/* GAMBAR */

img{
    width:100%;
    height:100vh;
    object-fit:cover;
    display:block;
}

/* TOMBOL MUSIK */

.music-btn{
    position:fixed;
    right:20px;
    bottom:20px;
    width:60px;
    height:60px;
    border:none;
    border-radius:50%;
    font-size:24px;
    cursor:pointer;
    z-index:999;
}

</style>
</head>

<body>

<!-- COVER -->

<div id="cover">

    <h1>Undangan Pernikahan</h1>

    <p>Dengan hormat mengundang Anda untuk hadir</p>

    <button class="btn" onclick="openInvitation()">
        Buka Undangan
    </button>

    <button class="btn" onclick="openMap()">
        Peta Lokasi Resepsi
    </button>

</div>

<!-- AUDIO -->

<audio id="music" loop>
    <source src="musik.mp3" type="audio/mpeg">
</audio>

<!-- TOMBOL MUSIK -->

<button class="music-btn" onclick="toggleMusic()">
🎵
</button>

<!-- HALAMAN UNDANGAN -->

<img src="halaman1.jpg">
<img src="halaman2.jpg">
<img src="halaman3.jpg">
<img src="halaman4.jpg">
<img src="halaman5.jpg">
<img src="halaman6.jpg">

<script>

const music = document.getElementById("music");

function openInvitation(){

    music.play();

    document.getElementById("cover").style.display = "none";

}

function openMap(){

    window.open(
    "https://www.google.com/maps/search/?api=1&query=Royal+Ambarrukmo+Yogyakarta",
    "_blank"
    );

}

function toggleMusic(){

    if(music.paused){

        music.play();

    }else{

        music.pause();

    }

}

</script>

</body>
</html>
