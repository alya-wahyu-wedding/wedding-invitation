<!DOCTYPE html>

<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Undangan Pernikahan Alya & Wahyu</title>

<!-- Thumbnail WA -->

<meta property="og:title" content="Undangan Pernikahan Alya & Wahyu">
<meta property="og:description" content="Kami mengundang Anda untuk hadir pada hari bahagia kami">
<meta property="og:image" content="https://alya-wahyu-wedding.github.io/wedding-invitation/thumbnail.png">
<meta property="og:image:secure_url" content="https://alya-wahyu-wedding.github.io/wedding-invitation/thumbnail.png">
<meta property="og:image:type" content="image/png">
<meta property="og:image:width" content="1731">
<meta property="og:image:height" content="909">
<meta property="og:url" content="https://alya-wahyu-wedding.github.io/wedding-invitation/">
<meta property="og:type" content="website">

<meta name="twitter:card" content="summary_large_image">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

body{
background:#f5f5f5;
overflow-x:hidden;
font-family:Georgia, serif;
}

/* COVER */

#cover{
position:relative;
width:100%;
max-width:700px;
margin:auto;
}

.cover-img{
width:100%;
display:block;
}

/* AREA KLIK PADA COVER */

.btn-buka{
position:absolute;
left:22%;
bottom:19%;
width:18%;
height:6%;
cursor:pointer;
}

.btn-peta{
position:absolute;
right:22%;
bottom:19%;
width:18%;
height:6%;
cursor:pointer;
}

/* KONTEN */

#content{
display:none;
max-width:700px;
margin:auto;
background:white;
animation:fade .8s;
}

.page{
width:100%;
height:auto;
display:block;
}

@keyframes fade{
from{opacity:0;}
to{opacity:1;}
}

/* FLOAT BUTTON */

.floating{
position:fixed;
right:15px;
bottom:15px;
display:none;
flex-direction:column;
gap:10px;
z-index:9999;
}

.float-btn{
width:70px;
height:70px;
border:none;
border-radius:50%;
font-size:13px;
font-weight:bold;
cursor:pointer;
box-shadow:0 4px 12px rgba(0,0,0,.25);
}

.home{
background:#6d0015;
color:white;
}

.peta{
background:#d4af37;
color:white;
}

/* =======================
   FLOWER & SPARKLE EFFECT
======================= */

#effects{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
overflow:hidden;
z-index:999;
}

.petal{
position:absolute;
top:-50px;
font-size:18px;
opacity:.35;
animation:fall linear infinite;
}

.p1{left:5%;animation-duration:12s;}
.p2{left:15%;animation-duration:15s;}
.p3{left:30%;animation-duration:18s;}
.p4{left:45%;animation-duration:13s;}
.p5{left:60%;animation-duration:17s;}
.p6{left:75%;animation-duration:14s;}
.p7{left:90%;animation-duration:16s;}

@keyframes fall{
0%{
transform:translateY(-50px) rotate(0deg);
}
100%{
transform:translateY(110vh) rotate(360deg);
}
}

.sparkle{
position:absolute;
width:4px;
height:4px;
border-radius:50%;
background:#ffd700;
opacity:.5;
animation:twinkle 3s infinite;
}

@keyframes twinkle{
0%{
opacity:.2;
transform:scale(.5);
}
50%{
opacity:1;
transform:scale(1.4);
}
100%{
opacity:.2;
transform:scale(.5);
}
}

</style>

</head>

<body>

<audio id="musik" loop>
<source src="musik.mp3" type="audio/mpeg">
</audio>

<!-- COVER -->

<div id="cover">

<img src="cover.jpg" class="cover-img">

<div class="btn-buka" onclick="bukaUndangan()"></div>

<a
class="btn-peta"
href="https://www.google.com/maps/search/?api=1&query=Royal+Ambarrukmo+Yogyakarta"
target="_blank"> </a>

</div>

<!-- ISI UNDANGAN -->

<div id="content">

<img src="halaman1.jpg" class="page">
<img src="halaman2.jpg" class="page">
<img src="halaman3.jpg" class="page">
<img src="halaman4.jpg" class="page">
<img src="halaman5.jpg" class="page">
<img src="halaman6.jpg" class="page">

</div>

<div id="effects">

<div class="petal p1">🌸</div>
<div class="petal p2">🌸</div>
<div class="petal p3">🌸</div>
<div class="petal p4">🌸</div>
<div class="petal p5">🌸</div>
<div class="petal p6">🌸</div>
<div class="petal p7">🌸</div>

<div class="sparkle" style="top:10%;left:20%;"></div>
<div class="sparkle" style="top:25%;left:70%;"></div>
<div class="sparkle" style="top:40%;left:15%;"></div>
<div class="sparkle" style="top:55%;left:85%;"></div>
<div class="sparkle" style="top:75%;left:40%;"></div>

</div>

<!-- FLOAT BUTTON -->

<div class="floating">

<button
class="float-btn peta"
onclick="window.open('https://www.google.com/maps/search/?api=1&query=Royal+Ambarrukmo+Yogyakarta')">
PETA </button>

<button
class="float-btn home"
onclick="kembaliHome()">
HOME </button>

</div>

<script>

const musik = document.getElementById("musik");

function bukaUndangan(){

document.getElementById("cover").style.display="none";
document.getElementById("content").style.display="block";
document.querySelector(".floating").style.display="flex";

musik.play().catch(()=>{});

window.scrollTo({
top:0,
behavior:'smooth'
});

}

function kembaliHome(){

document.getElementById("content").style.display="none";
document.getElementById("cover").style.display="block";
document.querySelector(".floating").style.display="none";

window.scrollTo({
top:0,
behavior:'smooth'
});

}

</script>

</body>
</html>
