<!DOCTYPE html>

<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Undangan Pernikahan Alya & Wahyu</title>

<meta property="og:title" content="Undangan Pernikahan Alya & Wahyu">
<meta property="og:description" content="Kami mengundang Anda untuk hadir pada hari bahagia kami">
<meta property="og:image" content="https://alya-wahyu-wedding.github.io/wedding-invitation/thumbnail.png">
<meta property="og:url" content="https://alya-wahyu-wedding.github.io/wedding-invitation/">
<meta property="og:type" content="website">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="https://alya-wahyu-wedding.github.io/wedding-invitation/thumbnail.png">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

body{
background:#f5f5f5;
overflow-x:hidden;
font-family:Georgia, serif;
}

#cover{
position:fixed;
top:0;
left:0;
width:100%;
height:100vh;
background:#6d0015;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
z-index:9999;
}

#cover h1{
color:white;
font-size:34px;
margin-bottom:10px;
}

#cover h2{
color:#f3d9a2;
font-size:28px;
margin-bottom:40px;
}

.btn{
padding:15px 28px;
margin:8px;
border:none;
border-radius:12px;
font-size:18px;
cursor:pointer;
font-weight:bold;
}

.btn-open{
background:#f3d9a2;
color:#6d0015;
}

.btn-map{
background:white;
color:#6d0015;
text-decoration:none;
display:inline-block;
}

#content{
display:none;
max-width:700px;
margin:auto;
background:white;
}

.page{
width:100%;
height:auto;
display:block;
}

.floating{
position:fixed;
right:15px;
bottom:15px;
display:flex;
flex-direction:column;
gap:10px;
z-index:999;
}

.float-btn{
width:56px;
height:56px;
border:none;
border-radius:50%;
font-size:24px;
cursor:pointer;
box-shadow:0 4px 10px rgba(0,0,0,.25);
}

.location{
background:#d4af37;
color:white;
}

.home{
background:#6d0015;
color:white;
}

</style>

</head>

<body>

<audio id="musik" loop>
<source src="musik.mp3" type="audio/mpeg">
</audio>

<div id="cover">

<h1>Undangan Pernikahan</h1>

<h2>Alya & Wahyu</h2>

<button class="btn btn-open" onclick="bukaUndangan()">
Buka Undangan
</button>

<a
class="btn btn-map"
target="_blank"
href="https://www.google.com/maps/search/?api=1&query=Royal+Ambarrukmo+Yogyakarta">
Buka Lokasi Pernikahan </a>

</div>

<div id="content">

<img src="halaman1.jpg" class="page">
<img src="halaman2.jpg" class="page">
<img src="halaman3.jpg" class="page">
<img src="halaman4.jpg" class="page">
<img src="halaman5.jpg" class="page">
<img src="halaman6.jpg" class="page">

</div>

<div class="floating">

<button
class="float-btn location"
onclick="window.open('https://www.google.com/maps/search/?api=1&query=Royal+Ambarrukmo+Yogyakarta')">
📍 </button>

<button
class="float-btn home"
onclick="kembaliHome()">
🏠 </button>

</div>

<script>

const musik = document.getElementById("musik");

function bukaUndangan(){

document.getElementById("cover").style.display="none";
document.getElementById("content").style.display="block";

musik.play();

window.scrollTo({
top:0,
behavior:'smooth'
});

}

function kembaliHome(){

document.getElementById("content").style.display="none";
document.getElementById("cover").style.display="flex";

window.scrollTo({
top:0,
behavior:'smooth'
});

}

</script>

</body>
</html>
